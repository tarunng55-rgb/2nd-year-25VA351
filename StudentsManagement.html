<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#e8f0fe;
    margin:0;
    padding:20px;
}

.container{
    width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h1{
    text-align:center;
    color:#0d6efd;
}

form{
    display:flex;
    gap:10px;
    margin:20px 0;
}

.search-filter{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

input,select{
    flex:1;
    padding:10px;
    border:1px solid #999;
    border-radius:5px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#0d6efd;
    color:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#f5f5f5;
}

.delete{
    background:#dc3545;
}

.delete:hover{
    background:#b02a37;
}

#noRecord{
    text-align:center;
    color:red;
    font-weight:bold;
    display:none;
    margin-top:10px;
}

#total{
    margin-top:15px;
    font-weight:bold;
}

@media(max-width:850px){

.container{
    width:95%;
}

form,
.search-filter{
    flex-direction:column;
}

}
</style>
</head>

<body>

<div class="container">

<h1>Student Management System</h1>

<form id="studentForm">

<input type="text" id="name" placeholder="Enter Student Name" required>

<select id="branch" required>
<option value="">Select Branch</option>
<option value="Engineering">Engineering</option>
<option value="Science">Science</option>
<option value="Arts">Arts</option>
<option value="Commerce">Commerce</option>
</select>

<button type="submit">Add Student</button>

</form>

<div class="search-filter">

<input type="text" id="search" placeholder="Search by Name">

<select id="filterBranch">
<option value="">All Branches</option>
<option value="Engineering">Engineering</option>
<option value="Science">Science</option>
<option value="Arts">Arts</option>
<option value="Commerce">Commerce</option>
</select>

</div>

<table>

<thead>

<tr>
<th>Name</th>
<th>Branch</th>
<th>Action</th>
</tr>

</thead>

<tbody id="studentBody"></tbody>

</table>

<div id="noRecord">No Record Found</div>

<div id="total">Total Students : 0</div>

</div>



</body>
</html>
